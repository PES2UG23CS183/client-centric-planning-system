<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Project Plans</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans" class="active">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header flex-between">
    <div><h1 class="page-title">Project Plans</h1><p class="page-subtitle">All generated project plans.</p></div>
    <a href="/profiles" class="btn btn-primary">+ Generate from Profile</a>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>#</th><th>Client</th><th>Methodology</th><th>Timeline</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:each="p : ${plans}">
          <td th:text="${p.planId}"></td>
          <td th:text="${p.clientProfile.client.user.name}"></td>
          <td th:text="${#strings.abbreviate(p.methodology,40)}"></td>
          <td th:text="${p.timeline}"></td>
          <td>
            <span class="badge badge-muted"   th:if="${p.status.name()=='DRAFT'}"        th:text="${p.status}"></span>
            <span class="badge badge-accent"  th:if="${p.status.name()=='GENERATED'}"    th:text="${p.status}"></span>
            <span class="badge badge-warning" th:if="${p.status.name()=='UNDER_REVIEW'}" th:text="${p.status}"></span>
            <span class="badge badge-success" th:if="${p.status.name()=='FINALIZED'}"    th:text="${p.status}"></span>
            <span class="badge badge-success" th:if="${p.status.name()=='APPROVED'}"     th:text="${p.status}"></span>
          </td>
          <td>
            <div style="display:flex;gap:0.5rem;">
              <a th:href="@{/plans/{id}(id=${p.planId})}" class="btn btn-secondary btn-sm">View</a>
              <form th:action="@{/plans/delete/{id}(id=${p.planId})}" method="post" onsubmit="return confirm('Delete?');"><button type="submit" class="btn btn-danger btn-sm">Delete</button></form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(plans)}"><td colspan="6" style="text-align:center;color:var(--text-muted);padding:3rem;">No plans yet. <a href="/profiles" style="color:var(--accent);">Create a client profile first.</a></td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
