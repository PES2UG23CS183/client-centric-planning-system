<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Client Profiles</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles" class="active">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header flex-between">
    <div><h1 class="page-title">Client Profiles</h1><p class="page-subtitle">All client project profiles in the system.</p></div>
    <a href="/profiles/new" class="btn btn-primary">+ New Profile</a>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>#</th><th>Client</th><th>Working Style</th><th>Budget</th><th>Risk Tolerance</th><th>Clarity</th><th>Review Freq.</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:each="p : ${profiles}">
          <td th:text="${p.profileId}"></td>
          <td th:text="${p.client.user.name}"></td>
          <td><span class="badge badge-accent" th:text="${p.workingStyle}"></span></td>
          <td th:text="${p.budgetRange}"></td>
          <td>
            <span class="badge badge-danger"  th:if="${p.riskTolerance=='HIGH'}"   th:text="${p.riskTolerance}"></span>
            <span class="badge badge-success" th:if="${p.riskTolerance=='LOW'}"    th:text="${p.riskTolerance}"></span>
            <span class="badge badge-muted"   th:if="${p.riskTolerance=='MEDIUM'}" th:text="${p.riskTolerance}"></span>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <div style="width:60px;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;">
                <div th:style="'width:'+(${p.requirementClarity}*20)+'%;height:100%;background:var(--accent);border-radius:3px;'"></div>
              </div>
              <span style="font-size:0.8rem;" th:text="${p.requirementClarity}+'/5'"></span>
            </div>
          </td>
          <td th:text="${p.reviewFrequency}"></td>
          <td>
            <div style="display:flex;gap:0.5rem;">
              <a th:href="@{/profiles/{id}(id=${p.profileId})}" class="btn btn-secondary btn-sm">View</a>
              <a th:href="@{/profiles/edit/{id}(id=${p.profileId})}" class="btn btn-secondary btn-sm">Edit</a>
              <form th:action="@{/profiles/delete/{id}(id=${p.profileId})}" method="post" onsubmit="return confirm('Delete?');"><button type="submit" class="btn btn-danger btn-sm">Delete</button></form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(profiles)}"><td colspan="8" style="text-align:center;color:var(--text-muted);padding:3rem;">No profiles yet. <a href="/profiles/new" style="color:var(--accent);">Create one.</a></td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
