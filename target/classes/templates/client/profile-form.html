<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>New Profile</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles" class="active">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title">New Client Profile</h1>
    <p class="page-subtitle">Capture client details to generate a project plan.</p>
  </div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div class="card" style="max-width:760px;">
    <form th:action="@{/profiles/new}" method="post">
      <div class="form-group">
        <label class="form-label">Select Client</label>
        <select name="clientId" class="form-select" required>
          <option value="">-- Choose a client --</option>
          <option th:each="c : ${clients}" th:value="${c.clientId}" th:text="${c.user.name}+' ('+${c.organisation}+')'"></option>
        </select>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Working Style</label>
          <select name="workingStyle" class="form-select" required>
            <option value="AGILE">Agile</option>
            <option value="WATERFALL">Waterfall</option>
            <option value="HYBRID">Hybrid</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Communication Mode</label>
          <select name="communication" class="form-select" required>
            <option value="EMAIL">Email</option>
            <option value="MEETINGS">Meetings</option>
            <option value="WEEKLY_CALLS">Weekly Calls</option>
            <option value="DASHBOARD">Dashboard</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Review Frequency</label>
          <select name="reviewFrequency" class="form-select" required>
            <option value="WEEKLY">Weekly</option>
            <option value="BIWEEKLY">Biweekly</option>
            <option value="MONTHLY">Monthly</option>
            <option value="MILESTONE_BASED">Milestone Based</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Risk Tolerance</label>
          <select name="riskTolerance" class="form-select" required>
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Budget Range</label>
          <input type="text" name="budgetRange" class="form-control" placeholder="e.g. 50000-100000 INR" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Requirement Clarity (1–5)</label>
          <input type="number" name="requirementClarity" class="form-control" min="1" max="5" placeholder="1=unclear, 5=fully defined" required/>
          <p class="form-hint">1 = very unclear &nbsp;|&nbsp; 5 = fully defined</p>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Constraints / Notes</label>
        <textarea name="constraint" class="form-control" rows="3" placeholder="e.g. Must launch before Q3, no third-party APIs"></textarea>
      </div>
      <div style="display:flex;gap:1rem;margin-top:0.5rem;">
        <button type="submit" class="btn btn-primary">Create Profile</button>
        <a href="/profiles" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
