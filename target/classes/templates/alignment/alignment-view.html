<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Alignment Score</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment" class="active">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header flex-between">
    <div><h1 class="page-title">Alignment Score</h1><p class="page-subtitle">Client expectation vs generated plan consistency.</p></div>
    <div style="display:flex;gap:0.75rem;">
      <form th:action="@{/alignment/calculate/{id}(id=${planId})}" method="post"><button type="submit" class="btn btn-primary">Calculate / Recalculate</button></form>
      <a th:href="@{/plans/{id}(id=${planId})}" class="btn btn-secondary">Back to Plan</a>
    </div>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div th:if="${alignment!=null}">
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:1.5rem;margin-bottom:1.5rem;">
      <div class="card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
        <div style="position:relative;width:140px;height:140px;">
          <svg viewBox="0 0 140 140" width="140" height="140">
            <circle cx="70" cy="70" r="60" fill="none" stroke="var(--border-light)" stroke-width="12"/>
            <circle cx="70" cy="70" r="60" fill="none"
                    th:stroke="${alignment.alignmentScore>=80?'#00d4aa':(alignment.alignmentScore>=50?'#ffb347':'#ff5c7c')}"
                    stroke-width="12" stroke-linecap="round"
                    th:stroke-dasharray="${alignment.alignmentScore*3.77}+' 377'"
                    stroke-dashoffset="94" transform="rotate(-90 70 70)"/>
          </svg>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
            <div style="font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;color:var(--text-primary);"
                 th:text="${#numbers.formatDecimal(alignment.alignmentScore,1,0)}+'%'"></div>
          </div>
        </div>
        <span class="badge badge-success" th:if="${alignment.alignmentScore>=80}">High Alignment</span>
        <span class="badge badge-warning" th:if="${alignment.alignmentScore>=50 and alignment.alignmentScore<80}">Medium Alignment</span>
        <span class="badge badge-danger"  th:if="${alignment.alignmentScore<50}">Low Alignment</span>
        <p style="font-size:0.85rem;color:var(--text-secondary);text-align:center;" th:text="${alignment.consistencyVerdict}"></p>
      </div>
      <div class="card">
        <div class="card-header"><h2 class="card-title">Score Breakdown</h2></div>
        <div th:each="line : ${#strings.arraySplit(alignment.scoreBreakdown,'\n')}"
             style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid var(--border-light);">
          <span th:if="${#strings.startsWith(#strings.trim(line),'+2') or #strings.startsWith(#strings.trim(line),'+1')}"
                style="width:8px;height:8px;background:var(--success);border-radius:50%;flex-shrink:0;"></span>
          <span th:if="${#strings.startsWith(#strings.trim(line),'+0')}"
                style="width:8px;height:8px;background:var(--danger);border-radius:50%;flex-shrink:0;"></span>
          <span th:unless="${#strings.startsWith(#strings.trim(line),'+2') or #strings.startsWith(#strings.trim(line),'+1') or #strings.startsWith(#strings.trim(line),'+0')}"
                style="width:8px;height:8px;background:var(--warning);border-radius:50%;flex-shrink:0;"></span>
          <span style="font-size:0.875rem;color:var(--text-secondary);" th:text="${#strings.trim(line)}"></span>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${alignment==null}" class="card" style="text-align:center;padding:3rem;">
    <p style="color:var(--text-muted);margin-bottom:1.25rem;">No alignment score calculated yet.</p>
    <form th:action="@{/alignment/calculate/{id}(id=${planId})}" method="post">
      <button type="submit" class="btn btn-primary">Calculate Now</button>
    </form>
  </div>
</div>
</body>
</html>
