<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Edit Profile</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles" class="active">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title">Edit Profile</h1>
    <p class="page-subtitle" th:text="'Updating profile for '+${profile.client.user.name}"></p>
  </div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div class="card" style="max-width:760px;">
    <form th:action="@{/profiles/edit/{id}(id=${profile.profileId})}" method="post">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Working Style</label>
          <select name="workingStyle" class="form-select" required>
            <option value="AGILE"     th:selected="${profile.workingStyle.name()=='AGILE'}">Agile</option>
            <option value="WATERFALL" th:selected="${profile.workingStyle.name()=='WATERFALL'}">Waterfall</option>
            <option value="HYBRID"    th:selected="${profile.workingStyle.name()=='HYBRID'}">Hybrid</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Communication Mode</label>
          <select name="communication" class="form-select" required>
            <option value="EMAIL"        th:selected="${profile.communication.name()=='EMAIL'}">Email</option>
            <option value="MEETINGS"     th:selected="${profile.communication.name()=='MEETINGS'}">Meetings</option>
            <option value="WEEKLY_CALLS" th:selected="${profile.communication.name()=='WEEKLY_CALLS'}">Weekly Calls</option>
            <option value="DASHBOARD"    th:selected="${profile.communication.name()=='DASHBOARD'}">Dashboard</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Review Frequency</label>
          <select name="reviewFrequency" class="form-select" required>
            <option value="WEEKLY"          th:selected="${profile.reviewFrequency.name()=='WEEKLY'}">Weekly</option>
            <option value="BIWEEKLY"        th:selected="${profile.reviewFrequency.name()=='BIWEEKLY'}">Biweekly</option>
            <option value="MONTHLY"         th:selected="${profile.reviewFrequency.name()=='MONTHLY'}">Monthly</option>
            <option value="MILESTONE_BASED" th:selected="${profile.reviewFrequency.name()=='MILESTONE_BASED'}">Milestone Based</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Risk Tolerance</label>
          <select name="riskTolerance" class="form-select" required>
            <option value="LOW"    th:selected="${profile.riskTolerance=='LOW'}">Low</option>
            <option value="MEDIUM" th:selected="${profile.riskTolerance=='MEDIUM'}">Medium</option>
            <option value="HIGH"   th:selected="${profile.riskTolerance=='HIGH'}">High</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Budget Range</label>
          <input type="text" name="budgetRange" class="form-control" th:value="${profile.budgetRange}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Requirement Clarity (1–5)</label>
          <input type="number" name="requirementClarity" class="form-control" min="1" max="5" th:value="${profile.requirementClarity}" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Constraints / Notes</label>
        <textarea name="constraint" class="form-control" rows="3" th:text="${profile.constraintss}"></textarea>
      </div>
      <div style="display:flex;gap:1rem;margin-top:0.5rem;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{/profiles/{id}(id=${profile.profileId})}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
