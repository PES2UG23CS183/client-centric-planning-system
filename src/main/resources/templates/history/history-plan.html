<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Plan History</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history" class="active">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header flex-between">
    <div><h1 class="page-title">Plan Version History</h1><p class="page-subtitle">All saved snapshots for this plan, newest first.</p></div>
    <a th:href="@{/plans/{id}(id=${planId})}" class="btn btn-secondary">Back to Plan</a>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:each="r : ${records}" class="card" style="margin-bottom:1.25rem;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">
          <span class="badge badge-accent" th:text="'Version '+${r.version}"></span>
          <span style="font-size:0.8rem;color:var(--text-muted);" th:text="${r.date}"></span>
        </div>
        <p style="font-size:0.875rem;color:var(--text-secondary);line-height:1.7;" th:text="${r.summary}"></p>
      </div>
      <form th:action="@{/history/delete/{id}(id=${r.recordId})}" method="post" onsubmit="return confirm('Delete?');" style="margin-left:1rem;flex-shrink:0;">
        <input type="hidden" name="planId" th:value="${planId}"/>
        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
      </form>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(records)}" class="card" style="text-align:center;padding:3rem;">
    <p style="color:var(--text-muted);">No history records for this plan yet.</p>
  </div>
</div>
</body>
</html>
