<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Alignment Scores</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment" class="active">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1 class="page-title">Alignment Scores</h1><p class="page-subtitle">How well each plan matches client expectations.</p></div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>Client</th><th>Score</th><th>Verdict</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:each="a : ${alignments}">
          <td th:text="${a.projectPlan.clientProfile.client.user.name}"></td>
          <td>
            <div style="display:flex;align-items:center;gap:0.75rem;">
              <div style="width:80px;height:8px;background:var(--border-light);border-radius:4px;overflow:hidden;">
                <div th:style="'width:'+${a.alignmentScore}+'%;height:100%;border-radius:4px;background:'+(${a.alignmentScore}>=80?'var(--success)':(${a.alignmentScore}>=50?'var(--warning)':'var(--danger)'))+';'"></div>
              </div>
              <span style="font-weight:600;" th:text="${#numbers.formatDecimal(a.alignmentScore,1,1)}+'%'"></span>
            </div>
          </td>
          <td style="font-size:0.85rem;" th:text="${a.consistencyVerdict}"></td>
          <td><a th:href="@{/alignment/plan/{id}(id=${a.projectPlan.planId})}" class="btn btn-secondary btn-sm">View Details</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(alignments)}"><td colspan="4" style="text-align:center;color:var(--text-muted);padding:3rem;">No scores yet. Open a plan to calculate.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
