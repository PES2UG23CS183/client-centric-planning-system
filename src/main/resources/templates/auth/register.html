<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Client Planning System</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:rgba(108,99,255,0.15);border-radius:14px;margin-bottom:1rem;border:1px solid rgba(108,99,255,0.3);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      </div>
      <h1>Create Account</h1>
      <p>Join the planning system</p>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div style="margin-bottom:1.5rem;">
      <label class="form-label">I am a</label>
      <div class="role-grid">
        <div class="role-card selected" id="role-client" onclick="selectRole('CLIENT')">
          <h4>Client</h4>
          <p>I need a project plan for my requirements</p>
        </div>
        <div class="role-card" id="role-analyst" onclick="selectRole('BUSINESS_ANALYST')">
          <h4>Business Analyst</h4>
          <p>I build project plans for clients</p>
        </div>
      </div>
    </div>
    <form th:action="@{/register}" method="post">
      <input type="hidden" name="role" id="roleInput" value="CLIENT"/>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Jane Smith" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <div id="clientFields">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Organisation</label>
            <input type="text" name="organisation" class="form-control" placeholder="Company name"/>
          </div>
          <div class="form-group">
            <label class="form-label">Contact Info</label>
            <input type="text" name="contactInfo" class="form-control" placeholder="Phone / address"/>
          </div>
        </div>
      </div>
      <div id="analystFields" style="display:none;">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Specialisation</label>
            <input type="text" name="specialisation" class="form-control" placeholder="e.g. Agile, Finance"/>
          </div>
          <div class="form-group">
            <label class="form-label">Years of Experience</label>
            <input type="number" name="experience" class="form-control" placeholder="e.g. 5" min="0"/>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:0.5rem;">Create Account</button>
    </form>
    <div style="text-align:center;font-size:0.875rem;color:var(--text-muted);margin-top:1.25rem;">
      Already have an account? <a th:href="@{/login}" style="color:var(--accent);text-decoration:none;font-weight:600;">Sign in</a>
    </div>
  </div>
</div>
<script>
function selectRole(role){
  document.getElementById('roleInput').value=role;
  document.getElementById('role-client').classList.toggle('selected',role==='CLIENT');
  document.getElementById('role-analyst').classList.toggle('selected',role==='BUSINESS_ANALYST');
  document.getElementById('clientFields').style.display=role==='CLIENT'?'block':'none';
  document.getElementById('analystFields').style.display=role==='BUSINESS_ANALYST'?'block':'none';
}
</script>
</body>
</html>
