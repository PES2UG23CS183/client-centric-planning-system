<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Users</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users" class="active">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header flex-between">
    <div><h1 class="page-title">All Users</h1><p class="page-subtitle">Manage registered users.</p></div>
    <a href="/register" class="btn btn-primary">+ Add User</a>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td th:text="${u.userId}"></td>
          <td><div style="display:flex;align-items:center;gap:0.75rem;"><div class="avatar" style="width:32px;height:32px;font-size:0.75rem;" th:text="${#strings.substring(u.name,0,1)}"></div><span th:text="${u.name}"></span></div></td>
          <td th:text="${u.email}"></td>
          <td><span class="badge badge-accent" th:if="${u.role=='CLIENT'}">Client</span><span class="badge badge-success" th:if="${u.role=='BUSINESS_ANALYST'}">Analyst</span></td>
          <td><form th:action="@{/users/delete/{id}(id=${u.userId})}" method="post" onsubmit="return confirm('Delete this user?');"><button type="submit" class="btn btn-danger btn-sm">Delete</button></form></td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}"><td colspan="5" style="text-align:center;color:var(--text-muted);padding:3rem;">No users found.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
