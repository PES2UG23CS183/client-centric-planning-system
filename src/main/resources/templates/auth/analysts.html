<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Analysts</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users" class="active">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header flex-between">
    <div><h1 class="page-title">Business Analysts</h1><p class="page-subtitle">All registered business analysts.</p></div>
    <div style="display:flex;gap:0.75rem;"><a href="/users/clients" class="btn btn-secondary">View Clients</a><a href="/register" class="btn btn-primary">+ Add Analyst</a></div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Specialisation</th><th>Experience</th></tr></thead>
      <tbody>
        <tr th:each="a : ${analysts}">
          <td th:text="${a.analystId}"></td>
          <td><div style="display:flex;align-items:center;gap:0.75rem;"><div class="avatar" style="width:32px;height:32px;font-size:0.75rem;background:linear-gradient(135deg,#6c63ff,#ff5c7c);" th:text="${#strings.substring(a.user.name,0,1)}"></div><span th:text="${a.user.name}"></span></div></td>
          <td th:text="${a.user.email}"></td>
          <td th:text="${a.specialisation}"></td>
          <td th:text="${a.experience} + ' years'"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(analysts)}"><td colspan="5" style="text-align:center;color:var(--text-muted);padding:3rem;">No analysts yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
