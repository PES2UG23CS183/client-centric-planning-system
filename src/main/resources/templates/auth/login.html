<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Client Planning System</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:rgba(108,99,255,0.15);border-radius:14px;margin-bottom:1rem;border:1px solid rgba(108,99,255,0.3);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h1>Client Planning</h1>
      <p>Software Project Planning System</p>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:0.5rem;">Sign In</button>
    </form>
    <div class="auth-divider">or</div>
    <div style="text-align:center;font-size:0.875rem;color:var(--text-muted);">
      Don't have an account? <a th:href="@{/register}" style="color:var(--accent);text-decoration:none;font-weight:600;">Register here</a>
    </div>
  </div>
</div>
</body>
</html>
