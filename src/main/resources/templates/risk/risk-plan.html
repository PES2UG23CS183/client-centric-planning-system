<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Plan Risks</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks" class="active">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header flex-between">
    <div><h1 class="page-title">Risk Flags</h1><p class="page-subtitle">Risks identified for this project plan.</p></div>
    <div style="display:flex;gap:0.75rem;">
      <form th:action="@{/risks/flag/{id}(id=${planId})}" method="post"><button type="submit" class="btn btn-primary">Auto-Flag Risks</button></form>
      <a th:href="@{/plans/{id}(id=${planId})}" class="btn btn-secondary">Back to Plan</a>
    </div>
  </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div class="table-wrapper" style="margin-bottom:2rem;">
    <table>
      <thead><tr><th>Category</th><th>Description</th><th>Severity</th><th>Action</th></tr></thead>
      <tbody>
        <tr th:each="r : ${risks}">
          <td><span class="badge badge-muted" th:text="${r.category}"></span></td>
          <td th:text="${r.description}"></td>
          <td>
            <span class="badge badge-danger"  th:if="${r.severity.name()=='CRITICAL'}" th:text="${r.severity}"></span>
            <span class="badge badge-warning" th:if="${r.severity.name()=='HIGH'}"     th:text="${r.severity}"></span>
            <span class="badge badge-accent"  th:if="${r.severity.name()=='MEDIUM'}"   th:text="${r.severity}"></span>
            <span class="badge badge-success" th:if="${r.severity.name()=='LOW'}"      th:text="${r.severity}"></span>
          </td>
          <td>
            <form th:action="@{/risks/delete/{id}(id=${r.riskId})}" method="post" onsubmit="return confirm('Delete?');">
              <input type="hidden" name="planId" th:value="${planId}"/>
              <button type="submit" class="btn btn-danger btn-sm">Delete</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(risks)}"><td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem;">No risks yet. Click Auto-Flag Risks above.</td></tr>
      </tbody>
    </table>
  </div>
  <div class="card" style="max-width:640px;">
    <div class="card-header"><h2 class="card-title">Add Manual Risk</h2></div>
    <form th:action="@{/risks/add/{id}(id=${planId})}" method="post">
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="2" required placeholder="Describe the risk..."></textarea>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Severity</label>
          <select name="severity" class="form-select" required>
            <option value="LOW">Low</option><option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option><option value="CRITICAL">Critical</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category" class="form-select" required>
            <option value="Budget">Budget</option><option value="Timeline">Timeline</option>
            <option value="Requirement">Requirement</option><option value="Communication">Communication</option>
            <option value="Methodology">Methodology</option><option value="General">General</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Add Risk</button>
    </form>
  </div>
</div>
</body>
</html>
