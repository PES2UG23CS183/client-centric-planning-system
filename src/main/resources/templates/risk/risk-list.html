<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>All Risks</title><link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-dot"></span>ClientPlanning</a>
  <ul class="navbar-nav">
    <li><a href="/dashboard">Dashboard</a></li><li><a href="/users">Users</a></li>
    <li><a href="/profiles">Profiles</a></li><li><a href="/plans">Plans</a></li>
    <li><a href="/risks" class="active">Risks</a></li><li><a href="/alignment">Alignment</a></li><li><a href="/history">History</a></li>
  </ul>
  <div class="navbar-user"><div class="avatar" th:text="${#strings.substring(user.name,0,1)}">U</div><a href="/logout" class="btn btn-secondary btn-sm">Logout</a></div>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1 class="page-title">All Risks</h1><p class="page-subtitle">Risk flags across all project plans.</p></div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>#</th><th>Plan / Client</th><th>Category</th><th>Description</th><th>Severity</th></tr></thead>
      <tbody>
        <tr th:each="r : ${risks}">
          <td th:text="${r.riskId}"></td>
          <td><a th:href="@{/risks/plan/{id}(id=${r.projectPlan.planId})}" style="color:var(--accent);text-decoration:none;" th:text="${r.projectPlan.clientProfile.client.user.name}"></a></td>
          <td><span class="badge badge-muted" th:text="${r.category}"></span></td>
          <td style="max-width:320px;" th:text="${r.description}"></td>
          <td>
            <span class="badge badge-danger"  th:if="${r.severity.name()=='CRITICAL'}" th:text="${r.severity}"></span>
            <span class="badge badge-warning" th:if="${r.severity.name()=='HIGH'}"     th:text="${r.severity}"></span>
            <span class="badge badge-accent"  th:if="${r.severity.name()=='MEDIUM'}"   th:text="${r.severity}"></span>
            <span class="badge badge-success" th:if="${r.severity.name()=='LOW'}"      th:text="${r.severity}"></span>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(risks)}"><td colspan="5" style="text-align:center;color:var(--text-muted);padding:3rem;">No risks flagged yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
